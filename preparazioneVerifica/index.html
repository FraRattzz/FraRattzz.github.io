<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../stile.css">
    <title>Ordine Prodotti</title>
    
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Q.ta</th>
                <th>Descrizione</th>
                <th>Costo Unitario</th>
                <th>Totale</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="number" id="qta1" value="0" oninput="aggiornaRiga(0)"></td>
                <td>mouse</td>
                <td>16€</td>
                <td><input type="text" id="tot1" value="0" readonly></td>
            </tr>
            <tr>
                <td><input type="number" id="qta2" value="0" oninput="aggiornaRiga(1)"></td>
                <td>tastiera 105 tasti</td>
                <td>25€</td>
                <td><input type="text" id="tot2" value="0" readonly></td>
            </tr>
            <tr>
                <td><input type="number" id="qta3" value="0" oninput="aggiornaRiga(2)"></td>
                <td>stampante deskjet colori</td>
                <td>350€</td>
                <td><input type="text" id="tot3" value="0" readonly></td>
            </tr>
            <tr>
                <td><input type="number" id="qta4" value="0" oninput="aggiornaRiga(3)"></td>
                <td>scanner A4 colori</td>
                <td>200€</td>
                <td><input type="text" id="tot4" value="0" readonly></td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3" style="text-align: right;">
                    <button onclick="calcolaTotale()">TOTALE ORDINE ---></button>
                </td>
                <td><input type="text" id="totaleFinale" value="0" readonly></td>
            </tr>
        </tfoot>
    </table>

    <div>
        Desidero ricevere notifiche
        <input type="radio" name="notifiche" id="si" value="si" checked> <label for="si">si</label>
        <input type="radio" name="notifiche" id="no" value="no"> <label for="no">no</label>
    </div>

    <div>
        E-mail: <input type="text" id="email">
    </div>

    <div>
        Pagamento:
        <select id="pagamento">
            <option value="contanti">contanti</option>
            <option value="carta di credito">carta di credito</option>
            <option value="bonifico">bonifico</option>
        </select>
    </div>

    <div>
        <button onclick="inviaOrdine()">INVIA ORDINE</button>
        <button onclick="resetModulo()">AZZERA MODULO</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
