<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Studenti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card-header { background-color: #0d6efd; color: white; font-size: 1.5rem; font-weight: bold; }
        .table-dark-custom { background-color: #212529; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow">
        <div class="card-header">
            Gestione Studenti
        </div>
        <div class="card-body">
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <input type="text" id="nome" class="form-control" placeholder="Nome">
                </div>
                <div class="col-md-3">
                    <input type="text" id="cognome" class="form-control" placeholder="Cognome">
                </div>
                <div class="col-md-3">
                    <input type="number" id="eta" class="form-control" placeholder="Età">
                </div>
                <div class="col-md-3">
                    <button onclick="aggiungiStudente()" class="btn btn-success w-100">Aggiungi</button>
                </div>
            </div>

            <table class="table table-bordered align-middle">
                <thead class="table-dark-custom">
                    <tr>
                        <th>Nome</th>
                        <th>Cognome</th>
                        <th>Età</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody id="corpoTabella">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Array globale degli studenti
    let studenti = [];

    function aggiungiStudente() {
        // Recupero valori
        const nome = document.getElementById('nome').value.trim();
        const cognome = document.getElementById('cognome').value.trim();
        const eta = document.getElementById('eta').value.trim();

        // 1. Controllo che i campi siano compilati
        if (nome === "" || cognome === "" || eta === "") {
            alert("Per favore, compila tutti i campi.");
            return;
        }

        // 2. Crea oggetto JavaScript
        const nuovoStudente = {
            nome: nome,
            cognome: cognome,
            eta: eta
        };

        // 3. Inserisce l'oggetto nell'array
        studenti.push(nuovoStudente);

        // 4. Aggiorna la tabella e svuota i campi
        mostraStudenti();
        svuotaCampi();
    }

    function mostraStudenti() {
        const corpoTabella = document.getElementById('corpoTabella');
        
        // Svuota il corpo della tabella
        corpoTabella.innerHTML = "";

        // Scorre l'array studenti
        studenti.forEach((studente, indice) => {
            // Genera dinamicamente una riga
            const riga = `
                <tr>
                    <td>${studente.nome}</td>
                    <td>${studente.cognome}</td>
                    <td>${studente.eta}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="eliminaStudente(${indice})">Elimina</button>
                    </td>
                </tr>
            `;
            corpoTabella.innerHTML += riga;
        });
    }

    function eliminaStudente(indice) {
        // Rimuove dall'array lo studente all'indice ricevuto
        studenti.splice(indice, 1);
        
        // Richiama mostraStudenti per aggiornare la tabella
        mostraStudenti();
    }

    function svuotaCampi() {
        document.getElementById('nome').value = "";
        document.getElementById('cognome').value = "";
        document.getElementById('eta').value = "";
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
