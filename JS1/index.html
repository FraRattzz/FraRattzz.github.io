<!DOCTYPE html>
<html>
<head>
    <title>Esempio di funzione JavaScript</title>
</head>

<body>

    <h2>What Can JavaScript Do?</h2>

    <p id="demo">JavaScript can change HTML content.</p>

    <button type="button" onclick="cambiaTesto()">Click Me!</button>


    <h2>What Can JavaScript Do?</h2>

    <p>JavaScript can change HTML attribute values.</p>

    <p>In this case JavaScript changes the value of the src (source) attribute of an image.</p>

    <button type="button" onclick="accendiLuce()">Turn on the light</button>

    <img id="myImage" src="/JS1/images/LampadinaAccesa.jpg" style="width:100px">

    <button type="button" onclick="spegniLuce()">Turn off the light</button>

    <button id="btn1">Cliccami</button>

</body>


<script>
    // Questa funzione verrà chiamata quando l'utente clicca il bottone
    function cambiaTesto() {
        document.getElementById("demo").innerHTML = "Hello JavaScript!";
    }
     // Funzione che accende la "lampadina"
    function accendiLuce() {
        document.getElementById("myImage").src = "/JS1/images/LampadinaAccesa.jpg";
    }

    // Funzione che spegne la "lampadina"
    function spegniLuce() {
        document.getElementById("myImage").src = "images/LampadinaSpenta.png";
    }
    let bottone = document.getElementById("btn1");

    
    function saluta() {
        console.log("Hai cliccato il bottone!");
    }

    bottone.addEventListener("click", saluta);
    
</script>

</html>
